<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dont65 | Главная страница</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        
        <link rel="stylesheet" href="/assets/css/main.css" />
    </head>
    <body>
        <!-- Панель ошибки конфигурации -->
        <div id="hyprlandErrorBar" class="hyprland-error-bar">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="hyprlandErrorText">Config error: invalid syntax</span>
        </div>

        <!-- Контейнеры для визуальных эффектов -->
        <div id="activationStar" class="activation-star"><i class="fas fa-star"></i></div>
        <div id="glitchPixelsContainer"></div>
        <div id="glitchSectorsContainer"></div>
        <canvas id="snowCanvas"></canvas>
        <canvas id="confettiCanvas"></canvas>
        <div id="cursorHeater"></div>

        <!-- ОСНОВНОЙ КОНТЕНТ СТРАНИЦЫ -->
        <div class="container">
            <div class="avatar-container" id="profileLink">
                <div class="avatar">
                    <a href="https://t.me/dont65" target="_blank">
                        <img src="https://t.me/i/userpic/160/dont65.jpg" alt="Dont65 Avatar"/>
                    </a>
                </div>
                <div class="username">Dont65<span id="usernameEmoji"></span></div>
                <div class="age" id="age"></div>
            </div>

            <div class="quote-container">
                <div class="quote-timer-bar" id="quoteTimerBar"></div>
                <p class="quote" id="randomQuote">Загрузка...</p>
                <div class="quote-author" id="quoteAuthor"></div>
            </div>
            
            <div class="quote-refresh-container">
                <button class="refresh-quote-btn" id="refreshQuoteBtn">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>

            <div class="social-icons">
                <a href="https://discord.gg/s4DzndW9jR" target="_blank" class="social-icon discord-icon"><i class="fab fa-discord"></i></a>
                <a href="https://t.me/dont65bio" target="_blank" class="social-icon telegram-icon"><i class="fab fa-telegram"></i></a>
                <a href="https://steamcommunity.com/id/3TO_Dont65" target="_blank" class="social-icon steam-icon"><i class="fab fa-steam"></i></a>
                <a href="https://github.com/Dont65" target="_blank" class="social-icon github-icon"><i class="fab fa-github"></i></a>
                <a href="https://ru.namemc.com/profile/Dont65.1" target="_blank" class="social-icon namemc-link"><div class="namemc-icon"></div></a>
            </div>
        </div>

        <!-- МУЗЫКАЛЬНЫЙ ПЛЕЕР -->
        <div class="music-player-wrapper" id="musicPlayerWrapper" style="display: none">
            <div class="music-player">
                <div class="player-main-row">
                    <img src="" alt="Обложка" class="player-cover" id="playerCover" onerror="this.src = '/assets/background/background.jpg'" />
                    <div class="player-details">
                        <div class="player-title" id="playerTitle">Загрузка...</div>
                        <div class="player-author" id="playerAuthor">...</div>
                    </div>
                    <div class="player-controls">
                        <button id="prevTrackBtn"><i class="fas fa-backward-step"></i></button>
                        <button id="playPauseBtn" class="play-btn"><i class="fas fa-play"></i></button>
                        <button id="nextTrackBtn"><i class="fas fa-forward-step"></i></button>
                        <div class="controls-divider"></div>
                        <div class="volume-widget" id="volumeWidget">
                            <button id="muteBtn" class="volume-btn"><i class="fas fa-volume-up"></i></button>
                            <div class="volume-slider-wrapper">
                                <input type="range" id="volumeSlider" value="50" min="0" max="100" />
                            </div>
                        </div>
                    </div>
                </div>
                <div class="player-progress-container">
                    <span id="currentTimeDisplay">0:00</span>
                    <input type="range" id="progressSlider" value="0" min="0" max="100" />
                    <span id="durationDisplay">0:00</span>
                </div>
            </div>
        </div>
        
        <footer>© Dont65 | 2025 - 2026</footer>

        <!-- СКРИПТЫ (Порядок очень важен!) -->
        <script src="/assets/scripts/settings.js"></script>
        <script src="/assets/scripts/menu.js"></script>
        <script src="/assets/scripts/effects.js"></script>
        <script src="/assets/scripts/developer.js"></script>
        
        <script src="/assets/scripts/player.js"></script>
        <script src="/assets/scripts/pages/home.js"></script>
    </body>
</html>
