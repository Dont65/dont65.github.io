<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dont65 | Просмотр реестра</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />

        <style>
            :root {
                --primary-color: 42, 171, 238;
                --border-radius-l: 28px;
                --border-radius-m: 16px;
            }

            body {
                font-family: "Roboto", sans-serif;
                margin: 0;
                padding: 40px 20px;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                min-height: 100vh;
                background-image: url("assets/background/background.jpg");
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                color: #ffffff;
                position: relative;
                box-sizing: border-box;
            }

            /* Затемнение фона для лучшей читаемости */
            body::before {
                content: "";
                position: absolute;
                inset: 0;
                background-color: rgba(0, 0, 0, 0.4);
                z-index: 0;
                pointer-events: none;
            }

            .container {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 800px;
                padding: 40px;
                background-color: rgba(30, 30, 30, 0.75);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-radius: var(--border-radius-l);
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            }

            .back-btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                color: #ffffff;
                text-decoration: none;
                font-weight: 500;
                font-size: 14px;
                padding: 10px 20px;
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: var(--border-radius-m);
                margin-bottom: 30px;
                transition: all 0.2s ease;
            }

            .back-btn:hover {
                background: rgba(255, 255, 255, 0.15);
                transform: translateX(-4px);
            }

            .block-header {
                margin-bottom: 24px;
                padding-bottom: 16px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                text-align: left;
            }

            .block-header h1 {
                font-size: 28px;
                margin: 0 0 8px 0;
                font-weight: 700;
                color: rgb(var(--primary-color));
            }

            .block-header h2 {
                font-size: 16px;
                margin: 0;
                font-weight: 400;
                color: rgba(255, 255, 255, 0.7);
            }

            .cards-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 16px;
                margin-top: 16px;
            }

            .info-card {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: var(--border-radius-m);
                padding: 20px;
                text-align: left;
                transition: transform 0.2s ease, background 0.2s ease;
            }

            .info-card:hover {
                background: rgba(255, 255, 255, 0.08);
                transform: translateY(-2px);
            }

            .info-label {
                font-size: 12px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: rgb(var(--primary-color));
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .info-value {
                font-size: 16px;
                color: rgba(255, 255, 255, 0.9);
                line-height: 1.5;
                word-break: break-word;
            }

            .status-message {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 12px;
                padding: 40px 20px;
                text-align: center;
                font-size: 16px;
            }

            .status-message i {
                font-size: 48px;
                margin-bottom: 8px;
            }

            .status-message.error i {
                color: #ffb4ab;
            }

            /* --- Стили для светлой темы --- */
            body.light-theme {
                color: #1a1c1e;
            }
            body.light-theme::before {
                background-color: rgba(255, 255, 255, 0.4);
            }
            body.light-theme .container {
                background-color: rgba(255, 255, 255, 0.75);
                border: 1px solid rgba(255, 255, 255, 0.4);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            }
            body.light-theme .back-btn {
                color: #1a1c1e;
                background: rgba(0, 0, 0, 0.05);
                border: 1px solid rgba(0, 0, 0, 0.1);
            }
            body.light-theme .back-btn:hover {
                background: rgba(0, 0, 0, 0.1);
            }
            body.light-theme .info-card {
                background-color: rgba(0, 0, 0, 0.04);
                border: 1px solid rgba(0, 0, 0, 0.06);
            }
            body.light-theme .info-card:hover {
                background-color: rgba(0, 0, 0, 0.08);
            }
            body.light-theme .block-header h2,
            body.light-theme .info-value,
            body.light-theme .status-message {
                color: rgba(0, 0, 0, 0.8);
            }
            body.light-theme .block-header {
                border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            }
            body.light-theme .status-message.error i {
                color: #ba1a1a;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <a href="main.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> На главную
            </a>
            
            <div id="app">
                <div class="status-message">
                    <i class="fas fa-spinner fa-spin" style="color: rgb(var(--primary-color));"></i>
                    <span>Загрузка данных...</span>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const appDiv = document.getElementById("app");

                // 1. Импорт кастомного цвета
                const savedColor = localStorage.getItem("primaryColor");
                if (savedColor) {
                    document.documentElement.style.setProperty(
                        "--primary-color",
                        savedColor
                    );
                }

                // 2. Импорт выбранных обоев
                const savedWallpaper = localStorage.getItem("wallpaper");
                if (savedWallpaper) {
                    document.body.style.backgroundImage = `url('assets/background/${savedWallpaper}')`;
                }

                // 3. Импорт темы оформления
                const savedTheme = localStorage.getItem("theme");
                if (savedTheme === "light") {
                    document.body.classList.add("light-theme");
                }

                // Парсинг GET-параметров строки запроса
                const urlParams = new URLSearchParams(window.location.search);
                const fileName = urlParams.get("file");

                if (!fileName) {
                    appDiv.innerHTML = `
                    <div class="status-message error">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span><b>Ошибка:</b> Не указан параметр file.</span>
                        <span style="font-size: 14px; opacity: 0.7;">Пример использования: ?file=file.json</span>
                    </div>`;
                    return;
                }

                // Получение и рендеринг JSON данных реестра
                fetch(fileName)
                    .then((response) => {
                        if (!response.ok)
                            throw new Error(
                                `Ошибка сервера (${response.status})`
                            );
                        return response.json();
                    })
                    .then((data) => {
                        appDiv.innerHTML = "";

                        const cardsGrid = document.createElement("div");
                        cardsGrid.className = "cards-grid";

                        data.forEach((item) => {
                            if (
                                item.head !== undefined ||
                                item.subhead !== undefined
                            ) {
                                const headerBlock =
                                    document.createElement("div");
                                headerBlock.className = "block-header";

                                if (item.head)
                                    headerBlock.innerHTML += `<h1>${item.head}</h1>`;
                                if (item.subhead)
                                    headerBlock.innerHTML += `<h2>${item.subhead}</h2>`;

                                appDiv.appendChild(headerBlock);
                            } else if (
                                item.title !== undefined ||
                                item.text !== undefined
                            ) {
                                const contentBlock =
                                    document.createElement("div");
                                contentBlock.className = "info-card";

                                if (item.title)
                                    contentBlock.innerHTML += `<div class="info-label"><i class="fas fa-bars-staggered"></i> ${item.title}</div>`;
                                if (item.text)
                                    contentBlock.innerHTML += `<div class="info-value">${item.text}</div>`;

                                cardsGrid.appendChild(contentBlock);
                            }
                        });

                        appDiv.appendChild(cardsGrid);
                    })
                    .catch((error) => {
                        appDiv.innerHTML = `
                        <div class="status-message error">
                            <i class="fas fa-times-circle"></i>
                            <span><b>Не удалось загрузить файл</b><br>${error.message}</span>
                        </div>`;
                    });
            });
        </script>
    </body>
</html>
