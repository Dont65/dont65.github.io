<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dont65 | Просмотр реестра</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />

        <style>
            :root {
                --primary-color: 42, 171, 238;
                --border-radius-l: 28px;
                --border-radius-m: 16px;
            }

            body {
                font-family: "Roboto", sans-serif;
                margin: 0;
                padding: 40px 20px;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                min-height: 100vh;
                background-color: #121212;
                /* Если этот файл лежит рядом с index.html, фон подтянется. Если нет - путь нужно будет поправить */
                background-image: url("../assets/background/background.jpg");
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                color: #ffffff;
                box-sizing: border-box;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-color: rgba(0, 0, 0, 0.4);
                z-index: -1;
            }

            /* Основной контейнер со стекломорфизмом */
            .container {
                width: 100%;
                max-width: 800px;
                padding: 40px;
                background-color: rgba(30, 30, 30, 0.75);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-radius: var(--border-radius-l);
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
                animation: float 6s ease-in-out infinite;
            }

            @keyframes float {
                0% {
                    transform: translateY(0px);
                }
                50% {
                    transform: translateY(-10px);
                }
                100% {
                    transform: translateY(0px);
                }
            }

            /* Заголовки (head/subhead) */
            .block-header {
                text-align: center;
                margin-bottom: 32px;
                padding-bottom: 24px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            .block-header h1 {
                margin: 0 0 12px 0;
                font-size: 32px;
                font-weight: 700;
                color: rgb(var(--primary-color));
            }

            .block-header h2 {
                margin: 0;
                font-size: 18px;
                color: rgba(255, 255, 255, 0.7);
                font-weight: 400;
            }

            /* Сетка для контента */
            .cards-grid {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }

            /* Карточки контента (title/text) в стиле .info-card */
            .info-card {
                background-color: rgba(255, 255, 255, 0.05);
                padding: 24px;
                border-radius: var(--border-radius-m);
                text-align: left;
                transition:
                    transform 0.2s,
                    background-color 0.2s,
                    border-color 0.2s;
                border: 1px solid transparent;
            }

            .info-card:hover {
                transform: translateY(-4px);
                background-color: rgba(var(--primary-color), 0.1);
                border-color: rgba(var(--primary-color), 0.3);
            }

            .info-label {
                font-weight: 700;
                color: rgb(var(--primary-color));
                font-size: 20px;
                margin-bottom: 12px;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .info-value {
                color: rgba(255, 255, 255, 0.9);
                line-height: 1.6;
                font-size: 16px;
            }

            /* Статусные сообщения */
            .status-message {
                text-align: center;
                font-size: 18px;
                color: rgba(255, 255, 255, 0.7);
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }

            .status-message i {
                font-size: 40px;
                color: rgb(var(--primary-color));
            }

            .error i {
                color: #ff5555;
            }
            .error {
                color: #ff5555;
            }

            /* Кнопка "назад" */
            .back-btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                color: rgba(255, 255, 255, 0.7);
                text-decoration: none;
                margin-bottom: 24px;
                transition: 0.2s;
                font-size: 14px;
            }
            .back-btn:hover {
                color: rgb(var(--primary-color));
            }

            @media (max-width: 600px) {
                .container {
                    padding: 20px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <a
                href="#"
                onclick="
                    history.back();
                    return false;
                "
                class="back-btn"
            >
                <i class="fas fa-arrow-left"></i> Назад
            </a>
            <div id="app">
                <div class="status-message" id="status">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <span>Загрузка данных...</span>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const appDiv = document.getElementById("app");
                const statusDiv = document.getElementById("status");

                // Если в localStorage сохранен цвет с главной страницы, применяем его
                const savedColor = localStorage.getItem("primaryColor");
                if (savedColor) {
                    document.documentElement.style.setProperty(
                        "--primary-color",
                        savedColor,
                    );
                }

                const urlParams = new URLSearchParams(window.location.search);
                const fileName = urlParams.get("file");

                if (!fileName) {
                    appDiv.innerHTML = `
                    <div class="status-message error">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span><b>Ошибка:</b> Не указан параметр file.</span>
                        <span style="font-size: 14px; opacity: 0.7;">Пример использования: ?file=file.json</span>
                    </div>`;
                    return;
                }

                fetch(fileName)
                    .then((response) => {
                        if (!response.ok)
                            throw new Error(
                                `Ошибка сервера (${response.status})`,
                            );
                        return response.json();
                    })
                    .then((data) => {
                        appDiv.innerHTML = "";

                        // Создаем обертку-сетку для карточек
                        const cardsGrid = document.createElement("div");
                        cardsGrid.className = "cards-grid";

                        data.forEach((item) => {
                            if (
                                item.head !== undefined ||
                                item.subhead !== undefined
                            ) {
                                const headerBlock =
                                    document.createElement("div");
                                headerBlock.className = "block-header";

                                if (item.head)
                                    headerBlock.innerHTML += `<h1>${item.head}</h1>`;
                                if (item.subhead)
                                    headerBlock.innerHTML += `<h2>${item.subhead}</h2>`;

                                // Заголовки добавляем напрямую в app
                                appDiv.appendChild(headerBlock);
                            } else if (
                                item.title !== undefined ||
                                item.text !== undefined
                            ) {
                                const contentBlock =
                                    document.createElement("div");
                                contentBlock.className = "info-card";

                                // Добавим иконку списка к заголовку для стиля
                                if (item.title)
                                    contentBlock.innerHTML += `<div class="info-label"><i class="fas fa-bars-staggered"></i> ${item.title}</div>`;
                                if (item.text)
                                    contentBlock.innerHTML += `<div class="info-value">${item.text}</div>`;

                                // Карточки добавляем в сетку
                                cardsGrid.appendChild(contentBlock);
                            }
                        });

                        appDiv.appendChild(cardsGrid);
                    })
                    .catch((error) => {
                        appDiv.innerHTML = `
                        <div class="status-message error">
                            <i class="fas fa-times-circle"></i>
                            <span><b>Не удалось загрузить файл</b><br>${error.message}</span>
                        </div>`;
                    });
            });
        </script>
    </body>
</html>
