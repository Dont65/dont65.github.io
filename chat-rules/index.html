<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dont65 | Правила чатов</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        
        <!-- Глобальные стили -->
        <link rel="stylesheet" href="/assets/css/main.css" />
        <link rel="stylesheet" href="/assets/css/pages/chat-rules.css" />
    </head>
    <body>
        <div id="hyprlandErrorBar" class="hyprland-error-bar"><span id="hyprlandErrorText"></span></div>
        <div id="activationStar" class="activation-star"><i class="fas fa-star"></i></div>
        <div id="glitchPixelsContainer"></div>
        <div id="glitchSectorsContainer"></div>
        <canvas id="snowCanvas"></canvas>
        <canvas id="confettiCanvas"></canvas>
        <div id="cursorHeater"></div>

        <div class="container rules-container">
            <div class="header">
                <h1><i class="fas fa-book"></i> Основные положения правил</h1>
                <p>Обязательны к соблюдению всеми участниками сообщества</p>
            </div>

            <div class="rules-accordion" id="rulesAccordion">
                <div class="loading" id="loadingRules">
                    <i class="fas fa-spinner fa-spin"></i> Загрузка правил...
                </div>
            </div>

            <div class="rules-section">
                <div class="rule-last" id="lastUpdate">Загрузка даты...</div>
            </div>

            <a href="/" class="back-btn">
                <i class="fas fa-arrow-left"></i> Вернуться на главную
            </a>
        </div>

        <footer>© Dont65 | 2025 - 2026</footer>

        <!-- СКРИПТЫ -->
        <script src="/assets/scripts/settings.js"></script>
        <script src="/assets/scripts/menu.js"></script>
        <script src="/assets/scripts/effects.js"></script>
        <script src="/assets/scripts/developer.js"></script>
        
        <!-- Скрипт логики самих правил -->
        <script src="/assets/scripts/pages/chat-rules.js"></script>
    </body>
