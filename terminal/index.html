<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Терминал Dont65</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <style>
            :root {
                --primary-color: 42, 171, 238;
            }

            body {
                margin: 0;
                padding: 0;
                height: 100vh;
                background-color: #000;
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
                font-family: "Courier New", monospace;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
            }

            body::before {
                content: "";
                position: absolute;
                inset: 0;
                background-color: rgba(0, 0, 0, 0.5);
                z-index: -1;
            }

            #terminal-window {
                width: 90%;
                max-width: 900px;
                height: 85vh;
                background-color: rgba(20, 20, 20, 0.75);
                backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
                display: flex;
                flex-direction: column;
                box-sizing: border-box;
                color: #f0f0f0;
                position: relative;
                transition: opacity 0.5s;
                overflow: hidden;
            }

            #terminal-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 15px 20px 10px 20px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                font-family: "Roboto", sans-serif;
                font-size: 14px;
                color: rgba(255, 255, 255, 0.7);
            }

            .header-actions button {
                background: none;
                border: none;
                color: inherit;
                cursor: pointer;
                font-size: 16px;
                transition: color 0.2s;
            }
            .header-actions button:hover {
                color: rgb(var(--primary-color));
            }

            #terminal-container {
                flex-grow: 1;
                overflow-y: auto;
                padding: 20px;
                display: flex;
                flex-direction: column;
            }

            #output {
                white-space: pre-wrap;
                margin-bottom: 5px;
                line-height: 1.4;
                font-size: 15px;
            }

            .input-line {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                font-size: 15px;
                position: relative;
            }

            #prompt {
                margin-right: 8px;
                white-space: nowrap;
            }

            .user-text {
                color: #ffffff;
            }
            .accent-text {
                color: rgb(var(--primary-color));
                font-weight: bold;
            }
            .success {
                color: #8bd450;
            }
            .error {
                color: #ff5555;
            }
            .info {
                color: #50b4d4;
            }
            .warning {
                color: #f1fa8c;
            }
            .system {
                color: #ffb86c;
            }
            .comment {
                color: #6272a4;
            }

            /* Имитация ввода с курсором */
            #visual-input {
                white-space: pre-wrap;
                word-break: break-all;
                color: #f0f0f0;
            }

            .cursor {
                color: rgb(var(--primary-color));
                animation: blink 1s step-end infinite;
                margin-left: 2px;
            }

            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0;
                }
            }

            /* Настоящий, но невидимый инпут */
            #command {
                position: absolute;
                opacity: 0;
                width: 1px;
                height: 1px;
                border: none;
                outline: none;
                pointer-events: none;
            }

            /* Скроллбар */
            #terminal-container::-webkit-scrollbar {
                width: 8px;
            }
            #terminal-container::-webkit-scrollbar-track {
                background: rgba(0, 0, 0, 0.2);
                border-radius: 4px;
            }
            #terminal-container::-webkit-scrollbar-thumb {
                background: rgba(var(--primary-color), 0.5);
                border-radius: 4px;
            }
            #terminal-container::-webkit-scrollbar-thumb:hover {
                background: rgba(var(--primary-color), 0.8);
            }

            /* NANO РЕДАКТОР */
            #nano-container {
                display: none;
                flex-direction: column;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.9);
                font-family: "Courier New", monospace;
            }
            #nano-header {
                background-color: #ddd;
                color: #000;
                text-align: center;
                padding: 2px 10px;
                font-weight: bold;
                font-size: 14px;
            }
            #nano-editor {
                flex-grow: 1;
                background: transparent;
                color: #f0f0f0;
                border: none;
                outline: none;
                padding: 10px;
                font-family: inherit;
                font-size: 15px;
                resize: none;
            }
            #nano-footer {
                background-color: #ddd;
                color: #000;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 6px 15px;
                font-size: 14px;
            }
            .nano-buttons {
                display: flex;
                gap: 10px;
            }
            .nano-btn {
                background: transparent;
                border: 1px solid #000;
                color: #000;
                font-family: inherit;
                font-size: 14px;
                cursor: pointer;
                padding: 4px 10px;
                font-weight: normal;
                transition: all 0.2s;
            }
            .nano-btn b {
                margin-right: 4px;
            }
            .nano-btn:hover {
                background: #000;
                color: #fff;
                border-color: #000;
            }
            #nano-status {
                font-style: italic;
            }

            /* МОБИЛЬНЫЕ КНОПКИ УПРАВЛЕНИЯ */
            #mobile-controls {
                position: absolute;
                bottom: 20px;
                right: 20px;
                display: none;
                gap: 10px;
                z-index: 100;
            }

            /* Показываем только на узких экранах */
            @media (max-width: 768px) {
                #mobile-controls {
                    display: flex;
                }
            }

            /* Скрываем кнопки, если запущен nano */
            #terminal-window.nano-active #mobile-controls {
                display: none !important;
            }

            .mobile-btn {
                background-color: rgba(20, 20, 20, 0.85);
                border: 1px solid rgba(var(--primary-color), 0.5);
                color: rgb(var(--primary-color));
                border-radius: 8px;
                padding: 12px 18px;
                font-family: inherit;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                backdrop-filter: blur(8px);
                transition: all 0.1s;
                /* Предотвращает выделение и зум на мобилках */
                user-select: none;
                -webkit-user-select: none;
                -webkit-tap-highlight-color: transparent;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            }

            .mobile-btn:active {
                background-color: rgba(var(--primary-color), 0.4);
                color: #fff;
                transform: scale(0.95);
            }
        </style>
    </head>
    <body>
        <div id="terminal-window">
            <div id="terminal-header">
                <span id="terminal-title"
                    ><i class="fas fa-terminal"></i> dont65.conf — bash</span
                >
                <div class="header-actions">
                    <button
                        onclick="window.location.href = '/'"
                        title="Вернуться на главную"
                    >
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <div id="terminal-container">
                <div id="output"></div>
                <div class="input-line" id="input-line-container">
                    <span id="prompt"></span>
                    <span id="visual-input"></span><span class="cursor">▋</span>
                    <input
                        type="text"
                        id="command"
                        autofocus
                        spellcheck="false"
                        autocomplete="off"
                    />
                </div>
            </div>

            <!-- Интерфейс Nano -->
            <div id="nano-container">
                <div id="nano-header">
                    GNU nano 6.2 &nbsp;&nbsp;&nbsp;&nbsp; Файл:
                    <span id="nano-filename"></span>
                </div>
                <textarea id="nano-editor" spellcheck="false"></textarea>
                <div id="nano-footer">
                    <div class="nano-buttons">
                        <button
                            id="nano-btn-exit"
                            class="nano-btn"
                            title="Сохранить и выйти"
                        >
                            <b>^X</b> Выход
                        </button>
                        <button
                            id="nano-btn-save"
                            class="nano-btn"
                            title="Сохранить изменения"
                        >
                            <b>^S</b> Сохранить
                        </button>
                    </div>
                    <span id="nano-status"></span>
                </div>
            </div>

            <!-- Мобильные кнопки управления -->
            <div id="mobile-controls">
                <button class="mobile-btn" data-key="Tab">TAB</button>
                <button class="mobile-btn" data-key="ArrowUp">
                    <i class="fas fa-arrow-up"></i>
                </button>
                <button class="mobile-btn" data-key="ArrowDown">
                    <i class="fas fa-arrow-down"></i>
                </button>
            </div>
        </div>

        <script>
            function initTheme() {
                const savedColor =
                    localStorage.getItem("primaryColor") || "42, 171, 238";
                document.documentElement.style.setProperty(
                    "--primary-color",
                    savedColor,
                );
                const savedBg =
                    localStorage.getItem("wallpaper") || "background.jpg";
                document.body.style.backgroundImage = `url('/assets/background/${savedBg}')`;
            }
            initTheme();

            const commandInput = document.getElementById("command");
            const visualInput = document.getElementById("visual-input");
            const output = document.getElementById("output");
            const prompt = document.getElementById("prompt");
            const terminalContainer =
                document.getElementById("terminal-container");
            const terminalWindow = document.getElementById("terminal-window");

            // Nano Элементы
            const nanoContainer = document.getElementById("nano-container");
            const nanoEditor = document.getElementById("nano-editor");
            const nanoFilenameDisplay =
                document.getElementById("nano-filename");
            const terminalTitle = document.getElementById("terminal-title");
            const nanoStatus = document.getElementById("nano-status");

            let commandHistory = [];
            let historyIndex = -1;
            let currentCommand = "";
            let isWaitingForPassword = false;

            // Виртуальная Файловая Система
            const virtualFS = {
                "love.txt": "Любви нет: null 😢\n",
                "friends.txt": "Друзья: null 😢\n",
                "creator.txt": "Создатель этого терминала: Dont65\n",
                "logo.txt":
                    " ██████╗  \n ██╔══██╗ \n ██║  ██║ \n ██║  ██║ \n ██████╔╝ \n ╚═════╝  ",
            };

            const configMap = {
                color: "primaryColor",
                snow: "snowEnabled",
                confetti: "confettiEnabled",
                background: "wallpaper",
                theme: "theme",
                glitch: "glitchEnabled",
                icons: "iconPack",
                eraser: "cursorEraserMode",
                blind: "brailleEnabled",
            };

            function setNormalPrompt() {
                prompt.innerHTML = `<span class="user-text">user@</span><span class="accent-text">dont65</span><span class="user-text">:~$</span>`;
            }
            setNormalPrompt();

            function printWelcome() {
                printToTerminal(
                    '<span class="accent-text">Dont65 WebOS (v2.0.1)</span>',
                );
                printToTerminal(
                    'Type <span class="accent-text">help</span> to see available commands.',
                );
                printToTerminal(
                    'Use <span class="accent-text">cat dont65.conf</span> or <span class="accent-text">setting list</span> to manage config.\n',
                );
            }
            printWelcome();

            let currentNanoFile = "";

            function openNano(filename) {
                currentNanoFile = filename;
                terminalWindow.classList.add("nano-active"); // Скрывает мобильные кнопки
                terminalContainer.style.display = "none";
                nanoContainer.style.display = "flex";
                terminalTitle.innerHTML = `<i class="fas fa-edit"></i> nano — ${filename}`;
                nanoFilenameDisplay.textContent = filename;
                nanoEditor.value = virtualFS[filename] || "";
                nanoStatus.textContent = ""; // Очистка статуса
                nanoEditor.focus();
            }

            function closeNano() {
                nanoContainer.style.display = "none";
                terminalContainer.style.display = "flex";
                terminalWindow.classList.remove("nano-active"); // Возвращает мобильные кнопки
                terminalTitle.innerHTML = `<i class="fas fa-terminal"></i> dont65.conf — bash`;
                commandInput.focus();
            }

            // Кнопки управления nano
            document
                .getElementById("nano-btn-save")
                .addEventListener("click", () => {
                    virtualFS[currentNanoFile] = nanoEditor.value;
                    const lines = nanoEditor.value.split("\n").length;
                    nanoStatus.textContent = `[ Записано строк: ${lines} ]`;
                    setTimeout(() => {
                        nanoStatus.textContent = "";
                    }, 3000);
                    nanoEditor.focus();
                });

            document
                .getElementById("nano-btn-exit")
                .addEventListener("click", () => {
                    virtualFS[currentNanoFile] = nanoEditor.value;
                    closeNano();
                    printToTerminal(
                        `<span class="info">Файл '${currentNanoFile}' сохранен.</span>`,
                    );
                });

            // Клавиатурные сокращения nano
            nanoEditor.addEventListener("keydown", (e) => {
                if (e.ctrlKey && e.key.toLowerCase() === "s") {
                    e.preventDefault();
                    document.getElementById("nano-btn-save").click();
                }
                if (e.ctrlKey && e.key.toLowerCase() === "x") {
                    e.preventDefault();
                    document.getElementById("nano-btn-exit").click();
                }
            });

            // Обработчики мобильных кнопок (TAB, Вверх, Вниз)
            document.querySelectorAll(".mobile-btn").forEach((btn) => {
                const triggerAction = (e) => {
                    e.preventDefault(); // Запрещаем сброс фокуса с input клавиатуры телефона
                    const key = btn.getAttribute("data-key");
                    const event = new KeyboardEvent("keydown", {
                        key: key,
                        bubbles: true,
                        cancelable: true,
                    });
                    commandInput.dispatchEvent(event);
                };

                // Используем touchstart чтобы реагировать моментально и не давать прятать клавиатуру
                btn.addEventListener("touchstart", triggerAction, {
                    passive: false,
                });
                btn.addEventListener("mousedown", triggerAction);
            });

            const commands = {
                help: {
                    description: "Показать список доступных команд",
                    execute: () => {
                        let helpText = "Доступные команды:\n";
                        const cmdList = Object.keys(commands).sort();
                        for (const cmd of cmdList) {
                            helpText += `  <span class="accent-text">${cmd.padEnd(15)}</span> - ${commands[cmd].description}\n`;
                        }
                        return helpText;
                    },
                },
                setting: {
                    description:
                        "Управление настройками (list | get {имя} | set {имя} {значение})",
                    execute: (args) => {
                        if (args.length === 0)
                            return '<span class="error">Использование: setting [list | get {имя} | set {имя} {значение}]</span>';
                        const action = args[0].toLowerCase();

                        if (action === "list") {
                            let res =
                                '<span class="info">Текущие настройки:</span>\n';
                            for (const [key, storageKey] of Object.entries(
                                configMap,
                            )) {
                                const val =
                                    localStorage.getItem(storageKey) ||
                                    "по умолчанию";
                                res += `  <span class="accent-text">${key.padEnd(12)}</span> = ${val}\n`;
                            }
                            return res;
                        }
                        if (args.length < 2)
                            return '<span class="error">Укажите имя параметра.</span>';

                        const key = args[1].toLowerCase();
                        const value = args.slice(2).join(" ");

                        if (!configMap[key])
                            return `<span class="error">Неизвестный параметр: ${key}</span>`;

                        if (action === "get") {
                            return `<span class="accent-text">${key}</span> = ${localStorage.getItem(configMap[key]) || "по умолчанию"}`;
                        }
                        if (action === "set") {
                            if (!value)
                                return '<span class="error">Ошибка: укажите значение.</span>';
                            if (
                                key === "color" &&
                                !/^(\d{1,3})\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})$/.test(
                                    value,
                                )
                            ) {
                                return '<span class="error">Ошибка: формат цвета должен быть R, G, B</span>';
                            }
                            if (
                                [
                                    "snow",
                                    "confetti",
                                    "glitch",
                                    "blind",
                                ].includes(key) &&
                                !["true", "false"].includes(value.toLowerCase())
                            ) {
                                return `<span class="error">Ошибка: ${key} может быть только true или false</span>`;
                            }
                            localStorage.setItem(configMap[key], value);
                            if (key === "color")
                                document.documentElement.style.setProperty(
                                    "--primary-color",
                                    value,
                                );
                            if (key === "background")
                                document.body.style.backgroundImage = `url('/assets/background/${value}')`;
                            return `<span class="success">Успешно:</span> Параметр <span class="accent-text">${key}</span> изменен на ${value}`;
                        }
                        return '<span class="error">Неизвестное действие (используйте list, get или set)</span>';
                    },
                },
                nano: {
                    description: "Текстовый редактор",
                    execute: (args) => {
                        if (args.length === 0)
                            return '<span class="error">Использование: nano {имя_файла}</span>';
                        const file = args[0];
                        if (file === "dont65.conf")
                            return '<span class="error">Отказано в доступе. Файл защищен системой.</span>';
                        openNano(file);
                        return null; // Ничего не печатаем сразу
                    },
                },
                cat: {
                    description: "Вывод содержимого файла",
                    execute: (args) => {
                        if (args.length === 0)
                            return '<span class="error">Использование: cat {имя_файла}</span>';
                        if (args[0] === "dont65.conf") {
                            const c =
                                localStorage.getItem("primaryColor") ||
                                "42, 171, 238";
                            const sn =
                                localStorage.getItem("snowEnabled") || "false";
                            const bg =
                                localStorage.getItem("wallpaper") ||
                                "background.jpg";
                            return `<span class="comment">// Цвета</span>\ncolor = ${c}\n\n<span class="comment">// Снег</span>\nsnow = ${sn}\n\n<span class="comment">// Обои</span>\nbackground = ${bg}`;
                        }
                        if (virtualFS[args[0]] !== undefined)
                            return virtualFS[args[0]];
                        return `<span class="error">cat: ${args[0]}: Нет такого файла или каталога</span>`;
                    },
                },
                time: {
                    description: "Показать текущее время",
                    execute: () =>
                        `<span class="info">Текущее время:</span> ${new Date().toLocaleTimeString()}`,
                },
                date: {
                    description: "Показать текущую дату",
                    execute: () =>
                        `<span class="info">Текущая дата:</span> ${new Date().toLocaleDateString("ru-RU", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}`,
                },
                fastfetch: {
                    description: "Системная информация (полный хаос)",
                    execute: () => {
                        // Независимые списки (полный рандом)
                        const oses = [
                            // Windows
                            "Windows 11",
                            "Windows 10",
                            "Windows 7",
                            "Windows XP",
                            "Windows 98",
                            // macOS
                            "macOS Sonoma",
                            "macOS Ventura",
                            "macOS Monterey",
                            "macOS Catalina",
                            "Mac OS X Snow Leopard",
                            // Debian/Ubuntu Family
                            "Debian GNU/Linux 12 (bookworm)",
                            "Ubuntu 24.04 LTS",
                            "Ubuntu 22.04 LTS",
                            "Kali Linux",
                            "Linux Mint 21.3",
                            "Pop!_OS 22.04 LTS",
                            "Parrot OS",
                            // Arch Family
                            "Arch Linux",

                            // Fedora/RHEL Family
                            "Fedora Linux 40",

                            "Rocky Linux 9",
                            "AlmaLinux",

                            "Gentoo Linux",

                            // Windows

                            "6.8.2-arch2-1",
                            "5.15.0-101-generic",

                            "6.1.0-18-amd64",

                            // BSD & Other
                            "13.2-RELEASE",

                        const cpus = [
                            "Apple A17 Pro",

                        const gpus = [
                            "NVIDIA GeForce RTX 4090",

                        const rams = [
                            1024, 2048, 4096, 8192, 16384, 32768, 65536, 131072,

                        const drives = [
                            { type: "NVMe SSD", size: 256 },

                            { type: "HDD", size: 8192 },
                        ];

                        // Выбираем абсолютно случайно и независимо
                        const os =
                            oses[Math.floor(Math.random() * oses.length)];
                        const kernel =
                            kernels[Math.floor(Math.random() * kernels.length)];

                        // Процессор (Шанс 5%, что его "нет")
                        let cpu = "None";
                        if (Math.random() > 0.05) {
                            cpu = cpus[Math.floor(Math.random() * cpus.length)];
                        }

                        // Видеокарта (Шанс 15%, что её "нет")
                        let gpu = "None";
                        if (Math.random() > 0.15) {
                            gpu = gpus[Math.floor(Math.random() * gpus.length)];
                        }

                        // Память
                        const totalRam =
                            rams[Math.floor(Math.random() * rams.length)];
                        const usedRam =
                            Math.floor(Math.random() * (totalRam * 0.8)) + 128;

                        // Диск
                        const drive =
                            drives[Math.floor(Math.random() * drives.length)];
                        const usedDrive =
                            Math.floor(Math.random() * (drive.size * 0.95)) + 5;
                        const displayTotalSize =
                            drive.size >= 1024
                                ? drive.size / 1024 + "TB"
                                : drive.size + "GB";
                        const displayUsedSize =
                            usedDrive >= 1024
                                ? (usedDrive / 1024).toFixed(1) + "TB"
                                : usedDrive + "GB";
                        const diskStr = `${displayUsedSize} / ${displayTotalSize} (${drive.type})`;

                        // Текстовая информация
                        const info = [
                            `<span class="accent-text">user</span>@<span class="accent-text">dont65</span>`,
                            `------------`,
                            `<span class="accent-text">OS</span>: ${os}`,
                            `<span class="accent-text">Kernel</span>: ${kernel}`,
                            `<span class="accent-text">CPU</span>: ${cpu}`,
                            `<span class="accent-text">GPU</span>: ${gpu}`,
                            `<span class="accent-text">Memory</span>: ${usedRam}MiB / ${totalRam}MiB`,
                            `<span class="accent-text">Disk</span>: ${diskStr}`,
                        ];

                        // Загрузка кастомного логотипа из виртуальной файловой системы (nano редактирование)
                        const rawLogo = virtualFS["logo.txt"] || "";
                        let logoLines = rawLogo.split("\n");

                        // Удаляем последнюю пустую строку, если она образовалась при переносе
                        if (
                            logoLines.length > 0 &&
                            logoLines[logoLines.length - 1] === ""
                        ) {
                            logoLines.pop();
                        }

                        // Вычисляем максимальную ширину логотипа, чтобы выровнять текст справа
                        let maxLogoWidth = 0;
                        for (let line of logoLines) {
                            if (line.length > maxLogoWidth)
                                maxLogoWidth = line.length;
                        }
                        if (maxLogoWidth === 0) maxLogoWidth = 10; // Подстраховка

                        // Сборка вывода
                        let outputStr = "\n";
                        const maxLines = Math.max(
                            logoLines.length,
                            info.length,
                        );

                        for (let i = 0; i < maxLines; i++) {
                            let logoPart = logoLines[i] || "";
                            logoPart = logoPart.padEnd(maxLogoWidth, " "); // Заполняем пробелами до максимальной длины
                            const infoPart = info[i] || "";
                            outputStr += `<span class="accent-text">${logoPart}</span>   ${infoPart}\n`;
                        }

                        return outputStr;
                    },
                },
                sudo: {
                    description: "Выполнить команду от имени суперпользователя",
                    execute: (args) => {
                        const fullCommand = args.join(" ");
                        if (fullCommand === "rm -rf /")
                            return "rm: it is dangerous to operate recursively on '/'\nrm: use --no-preserve-root to override this failsafe";
                        if (
                            fullCommand === "rm -rf /*" ||
                            fullCommand === "rm -rf / --no-preserve-root"
                        ) {
                            return new Promise((resolve) => {
                                document.getElementById(
                                    "input-line-container",
                                ).style.display = "none";
                                const dirs = [
                                    "bin",
                                    "boot",
                                    "dev",
                                    "etc",
                                    "home",
                                    "lib",
                                    "root",
                                    "sys",
                                    "usr",
                                    "var",
                                ];
                                let count = 0;
                                const interval = setInterval(() => {
                                    count++;
                                    const dir =
                                        dirs[
                                            Math.floor(
                                                Math.random() * dirs.length,
                                            )
                                        ];
                                    const randomFile = Math.random()
                                        .toString(36)
                                        .substring(2, 8);

                                    if (dir === "sys")
                                        printToTerminal(
                                            `rm: cannot remove '/${dir}/${Math.floor(Math.random() * 1000)}': Operation not permitted`,
                                        );
                                    else if (dir === "dev")
                                        printToTerminal(
                                            `rm: cannot remove '/${dir}/${randomFile}': Device or resource busy`,
                                        );
                                    else if (Math.random() > 0.8)
                                        printToTerminal(
                                            `rm: cannot remove '/${dir}/${randomFile}': Permission denied`,
                                        );
                                    else
                                        printToTerminal(
                                            `removed '/${dir}/${randomFile}'`,
                                        );

                                    if (count > 50) {
                                        clearInterval(interval);
                                        setTimeout(() => {
                                            printToTerminal(
                                                '<span class="error">Segmentation fault (core dumped)</span>\n<span class="warning">Kernel panic - not syncing: Attempted to kill init!</span>',
                                            );
                                            setTimeout(() => {
                                                terminalWindow.style.opacity =
                                                    "0";
                                                setTimeout(() => {
                                                    output.innerHTML = "";
                                                    document.getElementById(
                                                        "input-line-container",
                                                    ).style.display = "flex";
                                                    terminalWindow.style.opacity =
                                                        "1";
                                                    printWelcome();
                                                    resolve("");
                                                }, 2000);
                                            }, 1500);
                                        }, 500);
                                    }
                                }, 40);
                            });
                        }
                        return '<span class="error">sudo: Отказано в доступе. Инцидент будет записан.</span>';
                    },
                },
                exit: {
                    description: "Выйти на главную страницу",
                    execute: () => {
                        window.location.href = "/";
                        return '<span class="info">Переход на главную страницу...</span>';
                    },
                },
                clear: {
                    description: "Очистить терминал",
                    execute: () => {
                        output.innerHTML = "";
                        return "";
                    },
                },
                ls: {
                    description: "Список файлов",
                    execute: () => {
                        const allFiles = [
                            "dont65.conf",
                            ...Object.keys(virtualFS),
                        ];
                        return allFiles
                            .map((f) => `<span class="accent-text">${f}</span>`)
                            .join("  ");
                    },
                },
                whoami: {
                    description: "Показать текущего пользователя",
                    execute: () => "user",
                },
                echo: {
                    description: "Повторить введённый текст",
                    execute: (args) =>
                        args.join(" ") ||
                        '<span class="error">Ошибка: не указан текст</span>',
                },
            };

            // Синхронизация визуального ввода с реальным
            commandInput.addEventListener("input", () => {
                if (isWaitingForPassword) {
                    visualInput.textContent = ""; // Скрываем ввод пароля
                } else {
                    visualInput.textContent = commandInput.value;
                }
            });

            commandInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && isWaitingForPassword) {
                    e.preventDefault();
                    commandInput.value = "";
                    visualInput.textContent = "";
                    isWaitingForPassword = false;

                    printToTerminal("");
                    printToTerminal("su: Authentication failure");
                    setNormalPrompt();
                    return;
                }

                if (e.key === "Tab" && !isWaitingForPassword) {
                    e.preventDefault();
                    const rawInput = commandInput.value;
                    const parts = rawInput.split(" ");

                    if (parts.length === 1) {
                        const matches = Object.keys(commands).filter((cmd) =>
                            cmd.startsWith(parts[0]),
                        );
                        if (matches.length === 1)
                            commandInput.value = matches[0] + " ";
                        else if (matches.length > 1) {
                            printToTerminal(`${prompt.innerHTML} ${rawInput}`);
                            printToTerminal(
                                '<span class="accent-text">' +
                                    matches.join("  ") +
                                    "</span>",
                            );
                        }
                    } else if (parts.length === 2) {
                        const cmd = parts[0].toLowerCase();
                        const arg = parts[1];
                        let matches = [];

                        if (cmd === "setting")
                            matches = ["get", "set", "list"].filter((s) =>
                                s.startsWith(arg),
                            );
                        else if (cmd === "cat" || cmd === "nano")
                            matches = [
                                "dont65.conf",
                                ...Object.keys(virtualFS),
                            ].filter((f) => f.startsWith(arg));
                        else if (cmd === "sudo")
                            matches = Object.keys(commands).filter((c) =>
                                c.startsWith(arg),
                            );

                        if (matches.length === 1)
                            commandInput.value = `${parts[0]} ${matches[0]} `;
                        else if (matches.length > 1) {
                            printToTerminal(`${prompt.innerHTML} ${rawInput}`);
                            printToTerminal(
                                '<span class="info">' +
                                    matches.join("  ") +
                                    "</span>",
                            );
                        }
                    }
                    visualInput.textContent = commandInput.value;
                } else if (e.key === "ArrowUp" && !isWaitingForPassword) {
                    e.preventDefault();
                    if (commandHistory.length === 0) return;
                    if (historyIndex === -1) {
                        currentCommand = commandInput.value;
                        historyIndex = commandHistory.length - 1;
                    } else if (historyIndex > 0) historyIndex--;
                    commandInput.value = commandHistory[historyIndex];
                    visualInput.textContent = commandInput.value;
                } else if (e.key === "ArrowDown" && !isWaitingForPassword) {
                    e.preventDefault();
                    if (historyIndex === -1) return;
                    if (historyIndex < commandHistory.length - 1) {
                        historyIndex++;
                        commandInput.value = commandHistory[historyIndex];
                    } else {
                        historyIndex = -1;
                        commandInput.value = currentCommand;
                    }
                    visualInput.textContent = commandInput.value;
                } else if (e.key === "Enter") {
                    e.preventDefault();
                    const command = commandInput.value.trim();
                    commandInput.value = "";
                    visualInput.textContent = "";

                    if (command === "") {
                        printToTerminal(prompt.innerHTML);
                        return;
                    }

                    commandHistory.push(command);
                    historyIndex = -1;

                    printToTerminal(
                        `${prompt.innerHTML} <span style="color: #fff">${command}</span>`,
                    );

                    const commandParts = command.split(" ");
                    const commandName = commandParts[0].toLowerCase();
                    const args = commandParts.slice(1);

                    if (commandName === "su") {
                        isWaitingForPassword = true;
                        prompt.innerHTML = "Password: ";
                        return;
                    }

                    const foundCommand = Object.keys(commands).find(
                        (cmd) => cmd.toLowerCase() === commandName,
                    );

                    if (foundCommand) {
                        const result = commands[foundCommand].execute(args);
                        if (result instanceof Promise) {
                            result.then((message) => {
                                if (message) printToTerminal(message);
                            });
                        } else if (result !== null) {
                            printToTerminal(result);
                        }
                    } else {
                        printToTerminal(
                            `<span class="error">bash: ${commandName}: команда не найдена</span>`,
                        );
                    }
                }
            });

            // Клик переводит фокус в строку
            document.addEventListener("click", (e) => {
                // Если клик не по кнопкам мобильным, и текст не выделяется
                if (
                    window.getSelection().toString() === "" &&
                    nanoContainer.style.display !== "flex" &&
                    !e.target.closest(".mobile-btn")
                ) {
                    commandInput.focus();
                }
            });

            function printToTerminal(text) {
                output.innerHTML += `<div>${text}</div>`;
                terminalContainer.scrollTop = terminalContainer.scrollHeight;
            }
        </script>
    </body>
</html>
